// ========== Build map ==========
const map = L.map('map', { zoomControl: true, tap: true }).setView([44.55, -110.7], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Yellowstone boundary
const ynpBounds = [[44.1319, -111.0574], [45.1055, -109.8100]];
L.rectangle(ynpBounds, {
  color: "#38a169", weight: 1, fill: false, dashArray: "4 4", opacity: 0.45
}).addTo(map).bindTooltip("黄石国家公园", { permanent: false, sticky: true });

// Grand Teton boundary (approximation)
const tetonBounds = [[43.5800, -110.8400], [44.1400, -110.4000]];
L.rectangle(tetonBounds, {
  color: "#d69e2e", weight: 1, fill: false, dashArray: "4 4", opacity: 0.45
}).addTo(map).bindTooltip("大提顿国家公园", { permanent: false, sticky: true });

// Markers
const hotelIcon = L.divIcon({
  html: '<div style="background:#2b6cb0;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.35);">🛏</div>',
  className: '', iconSize: [28, 28], iconAnchor: [14, 14]
});
hotels.forEach(h => {
  L.marker(h.coord, { icon: hotelIcon })
   .addTo(map)
   .bindPopup(`<div class="popup-title">🛏️ ${h.name}</div><div class="popup-sub">${h.desc}</div>`);
});

const sightIcon = L.divIcon({
  html: '<div style="background:#ed8936;width:11px;height:11px;border-radius:50%;border:2px solid white;box-shadow:0 1px 2px rgba(0,0,0,0.35);"></div>',
  className: '', iconSize: [11, 11], iconAnchor: [5.5, 5.5]
});
const gateIcon = L.divIcon({
  html: '<div style="background:#4a5568;color:white;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid white;">🚪</div>',
  className: '', iconSize: [20, 20], iconAnchor: [10, 10]
});
const townIcon = L.divIcon({
  html: '<div style="background:#718096;color:white;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid white;">🏘</div>',
  className: '', iconSize: [20, 20], iconAnchor: [10, 10]
});

sights.forEach(s => {
  let icon = sightIcon;
  if (s.type === "gate") icon = gateIcon;
  else if (s.type === "town") icon = townIcon;
  L.marker(s.coord, { icon: icon })
   .addTo(map)
   .bindPopup(`<div class="popup-title">${s.name}</div><div class="popup-sub">${s.desc || ""}</div>`);
});

// Daily routes
const dayLayers = {};
days.forEach(d => {
  if (d.path && d.path.length > 0) {
    const line = L.polyline(d.path, {
      color: d.color, weight: 4.5, opacity: 0.85,
      lineCap: "round", lineJoin: "round"
    });
    dayLayers[d.id] = line;
    line.addTo(map);
  }
});

// ========== Sidebar ==========
const dayList = document.getElementById("dayList");
days.forEach((d, idx) => {
  const card = document.createElement("div");
  card.className = "day-card";
  card.id = "card-" + d.id;

  const hasPath = d.path && d.path.length > 0;

  card.innerHTML = `
    <div class="day-header" data-day="${d.id}">
      <input type="checkbox" ${hasPath ? 'checked' : ''} ${hasPath ? '' : 'disabled'} data-day="${d.id}" onclick="event.stopPropagation()">
      <span class="day-swatch" style="background:${d.color}"></span>
      <span class="day-num">Day ${idx + 1}</span>
      <span class="day-title">${d.date} · ${d.title}</span>
      ${hasPath ? `<span class="day-zoom" data-day="${d.id}">定位</span>` : ''}
    </div>
    <div class="day-body">
      ${d.activities.map(a => `<div class="stop" style="color:${d.color}"><span class="time">${a.t}</span><span style="color:#555">${a.d}</span></div>`).join("")}
      ${d.hotel ? `<div class="hotel">🛏️ 住宿：${d.hotel}</div>` : ''}
    </div>`;

  dayList.appendChild(card);
});

// Expand/collapse on card header click
document.querySelectorAll('.day-header').forEach(h => {
  h.addEventListener('click', e => {
    if (e.target.tagName === 'INPUT' || e.target.classList.contains('day-zoom')) return;
    const card = h.parentElement;
    card.classList.toggle('open');
  });
});

// Checkbox toggle route
document.querySelectorAll('#dayList input[type=checkbox]').forEach(cb => {
  cb.addEventListener('change', e => {
    const id = e.target.dataset.day;
    if (!dayLayers[id]) return;
    if (e.target.checked) dayLayers[id].addTo(map);
    else map.removeLayer(dayLayers[id]);
  });
});

// Zoom-to-day
document.querySelectorAll('.day-zoom').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const id = btn.dataset.day;
    const d = days.find(x => x.id === id);
    if (!d || !d.path) return;

    // ensure layer visible
    const cb = document.querySelector(`input[data-day="${id}"]`);
    if (cb && !cb.checked) { cb.checked = true; dayLayers[id].addTo(map); }

    // highlight active card
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
    document.getElementById('card-' + id).classList.add('active');

    map.fitBounds(L.latLngBounds(d.path).pad(0.15));
  });
});

function toggleAllRoutes(show) {
  document.querySelectorAll('#dayList input[type=checkbox]').forEach(cb => {
    if (cb.disabled) return;
    cb.checked = show;
    const id = cb.dataset.day;
    if (!dayLayers[id]) return;
    if (show) dayLayers[id].addTo(map);
    else map.removeLayer(dayLayers[id]);
  });
}

function fitAll() {
  const all = [];
  days.forEach(d => { if (d.path) d.path.forEach(p => all.push(p)); });
  hotels.forEach(h => all.push(h.coord));
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('active'));
  map.fitBounds(L.latLngBounds(all).pad(0.05));
}

// Initial: fit Teton + Yellowstone area (not Seattle or SLC)
const tetonYnp = [];
days.filter(d => d.path).forEach(d => d.path.forEach(p => tetonYnp.push(p)));
map.fitBounds(L.latLngBounds(tetonYnp).pad(0.08));

// Open Day 4 (Teton south) and Day 5 (Teton north) by default
document.getElementById('card-d4').classList.add('open');
document.getElementById('card-d5').classList.add('open');

// Fix map size after layout shifts (mobile)
setTimeout(() => map.invalidateSize(), 100);
window.addEventListener('resize', () => map.invalidateSize());
window.addEventListener('orientationchange', () => setTimeout(() => map.invalidateSize(), 300));
</script>
